      relic: {cold: [1.5, 3.0]}
      dd:    {cold: [3.0, 5.0]}
      id:    {cold: [1.5, 4.0]}
    # Dark SU(3)_D is a non-SM color sector; MadGraph/MadDM cannot generate
    # the relic-density coannihilation set because they cannot represent the
    # dark color group. The relic chain therefore runs entirely through the
    # analytic backend + analytic-only branch in /dark-matter-constraints.
