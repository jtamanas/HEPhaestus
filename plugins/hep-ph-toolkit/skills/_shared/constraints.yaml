models:
  singlet-doublet:
    display:
      title: "Singlet-Doublet"
      hook:  "3×3 neutralino-like mixing, tree-level blind spot, loop floor."
    # spec_path INTENTIONALLY ABSENT until the spec migrates to _schema_version: 2.
    #
    # The singlet-doublet v3 spec lives at
    #   plugins/hep-ph-toolkit/skills/_shared/modelspec_v3/specs/singlet_doublet.yaml
    # but lacks the `_schema_version: 2` + `dm_phenomenology` blocks that
    # `taxonomy.read_axes` (plugins/hep-ph-toolkit/skills/_shared/taxonomy.py:261)
    # now requires. Wiring spec_path here would upgrade the soft "no axis_snapshot"
    # degradation into a hard `RegistryCorrupt` exception inside
    # /model-router (matching the pre-existing dark-su3 failure in
    # tests/test_cli_smoke.py::test_cli_smoke_runs_against_production_registry).
    #
    # Migrate the spec (add _schema_version: 2 + dm_phenomenology) and then
    # uncomment:
    #   spec_path: plugins/hep-ph-toolkit/skills/_shared/modelspec_v3/specs/singlet_doublet.yaml
    dm_candidates:
      - {name: chi1, spin: "1/2", notes: "Majorana, lightest eigenstate of the singlet-doublet mixing."}
    plot_axes:
      x: {symbol: "m_chi",      range: [100, 1500], units: "GeV", scale: linear}
      y: {symbol: "sin_2theta", range: [-1, 1],                   scale: linear}
    multi_component: false
    time_overrides:
      dd: {cold: [1.0, 2.0]}    # tree-DD via MadDM; same shape as relic chain
    chain_overrides:
      dd:
        chain: [sarah-build, spheno-build, madgraph, maddm, ddcalc]
        reason: >-
          Tree-level σ_SI/σ_SD via MadDM `generate direct_detection` on the
          existing UFO; the canonical θ=0 benchmark sits far off the blind-spot
          locus (m_χ₁ + M_Ψ·sin(2θ) = 0), so tree contributions are non-zero
          and dominate. The loop-DD chain (FeynArts → FormCalc → /looptools eval
          → /ddcalc) is the natural extension near the blind-spot locus and is
          deferred until the /looptools eval runtime ships.

