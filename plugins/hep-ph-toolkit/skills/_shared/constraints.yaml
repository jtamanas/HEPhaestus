      relic:
        chain: [sarah-build, spheno-build, dark-matter-constraints]
        reason: >-
          Dark SU(3)_D is non-SM color; MadGraph/MadDM cannot generate the
          coannihilation set. Relic runs through the analytic spectrum
          backend and the /dark-matter-constraints analytic-only branch.
