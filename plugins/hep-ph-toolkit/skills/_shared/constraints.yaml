# plugins/hep-ph-toolkit/skills/_shared/constraints.yaml
#
# Single source of truth for:
#   - prereq chains per constraint
#   - per-prereq implementation status (exists | planned)
#   - per-prereq cold/cached hour ranges (amortized contribution)
#   - per-model time overrides where warranted
#   - per-model chain_overrides where the default chain doesn't apply
#
# Edit the `status` field (and hours if needed) when a prereq skill ships.
#
# chain_overrides schema (per-model):
#   models.<model>.chain_overrides:
#     <constraint>:           # one of {relic, dd, id}
#       chain: [<prereq>, ...]   # full replacement for constraints.<c>.chain
#       reason: "<one-line>"     # required; surfaces in router caveats
#       backend_hint: <str>      # optional; e.g. 'analytic' to steer
#                                # /spheno-build away from SARAH/SPheno when
#                                # the model has no SPheno-compatible MSSM-
#                                # like representation.
#
# Use cases:
#   - Models whose SU(N) gauge structure makes MadGraph/MadDM unreachable
#     (e.g. dark SU(3) with non-SM color), and which therefore must run
#     entirely through an analytic spectrum + analytic-only DM router branch.
#   - Models whose default constraints chain must be augmented with extra
#     prereqs (use multi_component_prereq for that case, not chain_overrides).

schema_version: 2

# WS2 pointers — added when capabilities blocks were introduced (WS2 plan S1).
blocker_catalog_ref:
  path: plugins/hep-ph-toolkit/skills/_shared/blocker_catalog.yaml
  version: 1

taxonomy_ref:
  path: plugins/hep-ph-toolkit/skills/_shared/taxonomy.py
  version: 1

analytic_exceptions_ref:
  path: plugins/hep-ph-toolkit/skills/_shared/analytic_exceptions.yaml
  version: 1

prereqs:
  # Canonical list of every skill referenced by any chain.
  # hours: per-prereq amortized contribution to a single-constraint run.
  # capabilities: WS2 tool-capability matrix block per prereq.

  sarah-build:
    status: exists
    hours:
      cold:   [0.33, 1.0]
      cached: [0.08, 0.17]
    capabilities:
      description: "SARAH 4.15 model renderer — emits UFO, SPheno, CalcHEP model files"
      install_skill: sarah-install
      role:
        collider: none
        dd: none
        higgs: none
        id: none
        relic: none
      gating_for: [relic, dd, id, higgs]
      priority_tiebreak: 100
      depends_on_prereqs: []
      inputs_required: [modelspec_yaml]
      support:
        # and: dark gauge group + dark-charged fermion → SARAH_MATTER_REP_UNSUPPORTED (blocked)
        - and:
            - axis: A1
              match: ["SM + extra SU(N)", "SM + extra mixed"]
            - axis: A3.has_dark_charged_fermion
              match: true
          verdict: blocked
          blocker: SARAH_MATTER_REP_UNSUPPORTED
          blocker_class: missing-tool-feature
          fix_locality: upstream
          evidence: "intel/digest.md §§359-366 (SARAH renderer; dark-SU(N) reps)"
        # dark gauge group without dark-charged fermions (e.g. dsu3): SARAH can attempt
        # but UFO will fail at MG5 import (dt1 wall). Caveat, not hard block for SARAH itself.
        - axis: A1
          match: ["SM + extra SU(N)", "SM + extra mixed"]
          verdict: supported_with_caveat
          caveat: >-
            SARAH can emit files but UFO import into MG5 will fail (MG5_DARK_COLOR_TENSOR_WALL).
            Use analytic backend or hand-author SARAH model.
          evidence: "intel/digest.md §§232-238 (MG5 dt1 NameError; dark-color wall)"
        # Mirror sector
        - axis: A1
          match: "SM + mirror"
          verdict: supported_with_caveat
          caveat: "Mirror-sector embedding requires hand-authored SARAH files for gauge kinetics."
          evidence: "intel/digest.md (mirror sector)"
        # SM models: fully supported
        - axis: A1
          match: "*"
          match_all_current_values: true
          verdict: supported

