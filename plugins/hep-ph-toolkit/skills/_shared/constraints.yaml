          blocker: SPHENO_NOT_REQUESTED
          blocker_class: spec-authoring-gap
          evidence: "intel/digest.md (spheno output not requested; FU-wsj-03)"
        # Analytic-only spectrum: spheno not applicable
        - axis: model.analytic_module_status
          match: ["registered_active", "deprecated"]
          verdict: not_applicable
        # Otherwise supported
        - axis: A1
          match: "*"
          match_all_current_values: true
          verdict: supported

