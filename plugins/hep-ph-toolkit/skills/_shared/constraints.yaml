    spec_path: plugins/hep-ph-toolkit/skills/_shared/modelspec_v3/specs/dark_su3.yaml
    display:
      title: "Dark SU(3)"
      hook:  "SU(3)_D Higgsed to SU(2)_D; two DM candidates with exact parameter-independent blind spot on Psi."
    # Canonical dark-su3 model is the Higgsed Arcadi-Profumo variant (commit
    # 2bb56d6 archived the confining-variant template and declared the
    # dark-Higgs variant canonical). DM candidates: V (vector, spin-1, tree
    # SI via Higgs portal) and Psi (CP-odd scalar, spin-0, exact parameter-
    # independent SI blind spot — Eq. 29 of arXiv:2506.19062).
    dm_candidates:
      - {name: V,   spin: "1", notes: "Dark vector DM; tree-level SI via Higgs portal (H_1 + H_2 exchange)."}
      - {name: Psi, spin: "0", notes: "Dark pseudoscalar DM; exact parameter-independent SI blind spot (Eq. 29)."}
    plot_axes:
      x: {symbol: "m_V",   range: [1, 1000], units: "GeV", scale: log}
      y: {symbol: "m_Psi", range: [1, 300],  units: "GeV", scale: log}
    multi_component: true
    multi_component_prereq: dark-matter-constraints   # appended to every chain
