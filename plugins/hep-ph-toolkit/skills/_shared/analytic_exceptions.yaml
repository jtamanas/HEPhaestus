---
# Analytic-exception and proxy-run disclosure registry.
#
# Single source of truth for mandatory verbatim banners that must appear at
# registered placement file paths. Adding an entry here is the ONLY way to
# authorize a new analytic-backend or proxy-run pattern. PR review + CI
# well-formedness checks gate every new entry.
#
# Schema version: 1
# disclosure_version: 1  (bump for cross-cutting banner-text migrations)
#
# Per-entry fields (analytic kind):
#   id               — unique exception id, format: <modelname>-<NNN>
#   kind             — "analytic" | "proxy_run"
#   model            — model name (matches constraints.yaml models key)
#   status           — "active" | "deprecated" | "retired"
#   analytic_module  — repo-relative path to the analytic module file
#   signals_recorded — list of structural signals that fire for this model
#   placements       — dict of P1/P2/P3 → repo-relative file paths
#   banner           — verbatim disclosure text (raw; renderer wraps in blockquote)
#   deprecated_in    — git ref when deprecated (null if active)
#   retired_in       — git ref when retired (null if active or deprecated)

schema_version: 1
disclosure_version: 1

exceptions:
  - id: dsu3-002
    kind: analytic
    model: dark-su3
    status: active
    analytic_module: plugins/hep-ph-toolkit/skills/spheno-build/scripts/analytic_models/dark_su3.py
    signals_recorded: [S_GAUGE_DARK_NONABELIAN, S_DM_NOT_IN_UV_FIELDS]
    placements:
      P1: plugins/hep-ph-toolkit/skills/dark-matter-constraints/SKILL.md
      P2: plugins/hep-ph-toolkit/skills/dark-su3/SKILL.md
      P3: plugins/hep-ph-toolkit/skills/spheno-build/scripts/analytic_models/dark_su3.py
    banner: |
      **REGRESSION-ANCHOR ONLY — NOT A PHYSICS TARGET (dsu3-002).** Dark-SU(3)
      relic density runs through the analytic backend (`analytic_models.dark_su3`)
      and currently uses `<sigma v>` approximations (`sigmav_approx=True`). The
      emitted Ωh² values are roughly **25000× the Planck target** and must be read
      as regression anchors for the analytic pipeline, **not** as a physics
      prediction or a paper-fidelity result. Paper fidelity (Ω_tot h² ≈ 0.12) is
      out of reach this iteration and requires the upgrade roadmap in
      `analytic_models.dark_su3` (full Boltzmann integration + multi-component
      weighting in `/dark-matter-constraints`). Any downstream report that quotes
      these numbers MUST embed this banner verbatim — do not silently strip it.
    deprecated_in: null
    retired_in: null

  # Future analytic exceptions are appended here.
  # Naming convention: <modelname>-<NNN> (per-model serial, starting at 001;
  # dsu3 started at 002 because dsu3-001 was the pre-registry informal reference).

proxy_runs:
  - id: micromegas-singlet-doublet-proxy-001
    kind: proxy_run
    model: singlet-doublet
    status: active
    proxy_model: SingletDM
    signals_recorded: [PROXY_NO_CALCHEP_FROM_SARAH]
    placements:
      P1: plugins/hep-ph-toolkit/skills/dark-matter-constraints/SKILL.md
      P2: plugins/hep-ph-toolkit/skills/micromegas/SKILL.md
    banner: |
      **PROXY-RUN DISCLOSURE.** micrOMEGAs run on proxy model (SingletDM
      stand-in for singlet-doublet because CalcHEP `.mdl` files were not
      generated by SARAH). Results do not apply to the target model. Do not
      report proxy values as native predictions; do not compute relic pulls
      against Planck using proxy numbers; do not apply LZ-SD or PICO cuts to
      proxy σ_SD; tag every affected table row with `[proxy]`.
    deprecated_in: null
    retired_in: null
