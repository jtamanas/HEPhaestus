  SD_PROJECTION_MONOMIAL_OUT_OF_SPAN:
    class: regime-mismatch
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/sd_projection.wl projectOperators per-monomial diagnostic; DESIGN-ITEM4-AMENDMENT2R1.md"
    description: >-
      The permanent per-monomial diagnostic (the re-review's probe8, made a
      shipping guard) found an F-chain monomial of the (rotated) amplitude
      whose CONTRIBUTION to the completeness residual
      (raw_resid * |coeff| * ||mono|| / ||M_rot||) is >= 1e-8; the monomial is
      NAMED. The bar is on contribution, not raw in-span residual, because
      derivative (momentum-insertion) monomials are O(0.1) raw off the forward
