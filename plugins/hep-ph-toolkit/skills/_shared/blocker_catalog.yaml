    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/sd_projection.wl projectOperators; DESIGN-ITEM4-AMENDMENT2R1.md"
    description: >-
      The C-conjugate-then-rotate identity for a Majorana-crossed monomial
      (F5*F6/F7*F8 shape: BOTH chains chi-barred) failed its per-run
      verification: the flipped-spin production form and the machine-evaluated
