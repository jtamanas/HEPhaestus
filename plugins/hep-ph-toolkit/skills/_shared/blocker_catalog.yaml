    workaround_codes: []
    owned_by: this-ws

  KINETIC_MIXING_PORTAL_DECLARED_BUT_MISSING:
    class: spec-authoring-gap
    severity: fatal
    emitted_by: []
    triggered_by_axes: [A6]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
