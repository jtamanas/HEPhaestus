    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/sd_projection.wl referenceBasisGuards; DESIGN-ITEM4-AMENDMENT2.md Ruling 1 guards 2-3"
    description: >-
      The rotated-complete instrument failed null-column / collinear-pair /
