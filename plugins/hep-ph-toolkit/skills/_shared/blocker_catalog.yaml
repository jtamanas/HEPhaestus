    digest_reference: "intel/digest.md §12 (multi-component DM)"
    description: >-
      micrOMEGAs v1 does not support multi-component DM; attempting to run
      multi-component models produces incorrect results without warning.
    workaround_codes: []
    owned_by: this-ws

  CALCHEP_MDL_MISSING:
    class: spec-authoring-gap
    severity: fatal
    emitted_by: [micromegas]
    triggered_by_axes: []
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
