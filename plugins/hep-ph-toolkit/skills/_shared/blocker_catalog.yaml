# plugins/hep-ph-toolkit/skills/_shared/blocker_catalog.yaml
#
# Central registry of all blocker codes used across the hephaestus project.
# Owned by WS2 (tool-capability matrix).
#
# Two categories:
#   - "owned" (owned_by: this-ws): WS2-authored codes.
#   - "mirrored" (owned_by: dark-matter-constraints): codes emitted by
#     /dark-matter-constraints that WS2 mirrors for cross-reference. The
#     canonical source is dark-matter-constraints/SKILL.md and scripts/.
#
# Schema: blocker_catalog.schema.json
# WS2 synthesis ref: brainstorm/ws2_matrix_synthesis.md §2 Tension 8

schema_version: 1
catalog_date: "2026-04-26"

blockers:
  # ============================================================================
  # OWNED CODES (this-ws)
  # ============================================================================

  MG5_DARK_COLOR_TENSOR_WALL:
    class: fundamental-group-theory-gap
    severity: fatal
    emitted_by: [madgraph, maddm]
    triggered_by_axes: [A1, A2]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md (blocker-class mapping §6)"
    ws4_reference: "brainstorm/ws4_exception_synthesis.md:660-686 (analytic-exception trigger)"
    digest_reference: "intel/digest.md §52 (MG5 dt1 NameError)"
    description: >-
      MG5 color algebra has no SU(N)_D tensor indices; any dark-color UFO import
      fails at models/import_ufo.py:1604 with NameError: name 'dt1' is not defined.
      This is an MG5 architecture limitation, not a SARAH bug.
    workaround_codes: [ANALYTIC_BACKEND_PATH]
    owned_by: this-ws

  MG5_MIRROR_COLOR_WALL:
    class: fundamental-group-theory-gap
    severity: fatal
    emitted_by: [madgraph, maddm]
    triggered_by_axes: [A1]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md (blocker-class mapping §6)"
    digest_reference: "intel/digest.md (MG5 mirror-sector color limits)"
    description: >-
      MG5 color algebra cannot represent mirror-sector gauge group tensor indices;
      SM + mirror models are blocked at UFO import.
    workaround_codes: []
    owned_by: this-ws

  EFT_REWRITE_REQUIRED:
    class: fundamental-group-theory-gap
    severity: fatal
    emitted_by: [madgraph]
    triggered_by_axes: [A1, A2]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "intel/digest.md (EFT embedding)"
    description: >-
      Model requires an EFT rewrite before MG5 import; the UV completion
      contains group-theory structures MG5 cannot process.
    workaround_codes: []
    owned_by: this-ws

  SARAH_EMBEDDING_HANDAUTHOR_REQUIRED:
    class: fundamental-group-theory-gap
    severity: fatal
    emitted_by: [sarah-build]
    triggered_by_axes: [A1]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "intel/digest.md §§359-366 (SARAH renderer BSM limits)"
    description: >-
      SARAH cannot embed this gauge group structure; a hand-authored SARAH model
      file is required instead of automatic generation from the ModelSpec.
    workaround_codes: []
    owned_by: this-ws

  SARAH_MATTER_REP_UNSUPPORTED:
    class: missing-tool-feature
    fix_locality: upstream
    severity: fatal
    emitted_by: [sarah-build]
    triggered_by_axes: [A1, A3]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "intel/digest.md §§359-366 (SARAH renderer; dark-SU(N) reps)"
    description: >-
      SARAH renderer does not support matter representations under BSM non-abelian
      dark gauge groups (e.g. dark-color SU(3) fundamental reps for fermions).
      Treated as blocked (not supported_with_caveat) per WS2 plan D5.
    workaround_codes: [SARAH_EMBEDDING_HANDAUTHOR_REQUIRED]
    owned_by: this-ws

  MICROMEGAS_VERTEX_SILENT_FAIL:
    class: missing-tool-feature
    fix_locality: upstream
    severity: recoverable
    emitted_by: [micromegas]
    triggered_by_axes: [A1, A2]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "intel/digest.md §12 (micrOMEGAs vertex evaluator)"
    description: >-
      micrOMEGAs vertex evaluator silently mishandles non-SM gauge structures;
      no error is raised but results are physically incorrect.
    workaround_codes: []
    owned_by: this-ws

  MICROMEGAS_LOOP_SILENT_FAIL:
    class: regime-mismatch
    severity: recoverable
    emitted_by: [micromegas]
    triggered_by_axes: [A6]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "intel/digest.md §12 (micrOMEGAs loop-level)"
    description: >-
      micrOMEGAs tree-level relic calculation fails silently for loop-induced
