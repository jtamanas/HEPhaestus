  TREE_LEVEL_FORBIDDEN_USE_LOOP_CHAIN:
    class: regime-mismatch
    severity: recoverable
    emitted_by: [maddm, micromegas]
    triggered_by_axes: [A6]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "intel/digest.md (loop-only DD; 2HDM+a)"
    description: >-
      Tree-level direct detection is forbidden for this model (e.g. CP-odd
      mediator gives SI suppression); the correct chain uses FormCalc+LoopTools
      for loop-induced operators.
    workaround_codes: [LOOP_DD_TOOLING_PLANNED]
    owned_by: this-ws

  MADDM_STALE_DD_RESULT:
    class: missing-tool-feature
    fix_locality: upstream
    severity: recoverable
    emitted_by: [maddm]
    triggered_by_axes: [A6]
    ws1_reference: "brainstorm/ws1_taxonomy_synthesis.md §6"
    digest_reference: "singlet-doublet/references/maddm-invocation.md (frozen-SI DD-rerun staleness); maddm/SKILL.md"
    description: >-
      MadDM direct_detection-only reruns can serve a STALE spin-independent
      cross-section: the DD-assembly path does not always re-read the param
      card, and a reused output dir keeps previously compiled DD matrix
      elements, so sigma_SI stays bit-identical across genuinely different
      coupling points (canonical frozen sentinel 2.4258097266847696e-31
      GeV^-2). Emitted by maddm/scripts/staleness.py::detect_stale_dd when the
      parsed sigma_SI matches the sentinel or is bit-identical to a prior run
      whose param-card fingerprint differs. The runner recomputes into a fresh
      output dir by default (generate_maddm_script fresh=True); this blocker is
      the loud complement when upstream still serves a stale value.
    workaround_codes: []
    owned_by: this-ws

  MADDM_LAUNCH_NO_OUTPUT:
    class: missing-tool-feature
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [maddm]
    triggered_by_axes: []
    digest_reference: "maddm/scripts/maddm_run.py (MadDMNoOutputError); singlet-doublet/references/maddm-invocation.md"
    description: >-
      mg5_aMC --mode=maddm launch exited but wrote no
      output/run_*/MadDM_results.txt. Canonical trigger: an unparseable
      param-card block (SPheno's 1-loop DECAY1L) crashes the reader INSIDE
      `launch -f`, yet the enclosing process still exits 0 and stdout echoes the
      Planck reference constant (Omega h^2 = 1.2000e-01) as if computed —
      writing no output. A returncode of 0 is NOT evidence of success. Emitted by
      maddm_run.assert_launch_produced_output; the loud complement to
      slha_complete.strip_maddm_indigestible_blocks, protecting the whole
      no-output class (not just DECAY1L).
    workaround_codes: []
    owned_by: dark-matter-constraints

