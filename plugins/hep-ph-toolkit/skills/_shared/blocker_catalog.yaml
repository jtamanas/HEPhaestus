  FORMCALC_REDUCE_NO_OUTPUT:
    class: missing-tool-feature
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [formcalc]
    triggered_by_axes: []
    digest_reference: "formcalc/scripts/run_formcalc.py (require-the-artifact guard)"
    description: >-
      The FormCalc reduction driver (run_calcfeynamp.wls) exited 0 but wrote NO
      amp_reduced.m, so no reduction happened. The dominant cause is a broken
      ReadForm MathLink executable: FormCalc.m loads ReadForm from
      $FormCalcDir/$SystemID (NOT $FormCalcDir/bin/$SystemID), and when it
      cannot Install it emits ReadForm::notcompiled / LinkOpen::linke and
      Abort[]s — and a top-level Abort in a -script run ends with exit status 0,
      which previously produced a green {"status":"ok"} sidecar for work that
      never ran (silent success). run_formcalc.py now requires a non-empty
      amp_reduced.m before writing the sidecar/.build_key, scans the driver log
      for the MathLink markers, and reports the named cause in context.cause
      (readform_notcompiled | calcfeynamp_failed | formcalc_load_failed |
      unknown). Fix the install layout so $FormCalcDir/$SystemID/ReadForm
      resolves (see _shared/installs/formcalc), then rerun /formcalc reduce.
    workaround_codes: []
    owned_by: formcalc

  LOOPTOOLS_EVAL_NO_OUTPUT:
    class: missing-tool-feature
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/run_looptools.py run_driver (require-the-artifact guard); STEP2.md subtask 3a"
    description: >-
      The LoopTools eval driver (run_eval.wls) yielded no usable eval_output.json
      — missing, empty, or non-JSON — so PV evaluation did not produce a result.
      run_eval.wls can exit 0 while writing an empty file, and an aborted eval
      (MathLink::MLException → libc++abi terminating) can leave garbage; both
      previously surfaced as a raw Python JSONDecodeError traceback in run_driver.
      run_looptools.py now requires a non-empty, valid eval_output.json, scans the
      driver log, and reports a named context.cause: unbound_model_parameters |
      mathlink_aborted | looptools_selftest_failed | looptools_install_failed |
      point_unreadable | amp_unreadable | unknown. The dominant cause is a MODEL
      MISMATCH (STEP2.md subtask 3a): run_eval.wls is specialised to the 2HDM+a
      (TwoHdmAfix) model and looks masses up by 2HDM+a PDG codes / substitutes
      2HDM+a couplings; a different model (e.g. singlet-doublet) leaves those
      amplitude symbols unbound ($Failed / Missing), which run_eval.wls now
      detects BEFORE the MathLink call and reports as context.unbound_symbols.
      Generalising the substitution/projection/matching layer off TwoHdmAfix is
      roadmap step 3 (LOOP-FLOOR-ROADMAP.md); for a non-model cause, inspect
      context.log_tail and run/<ts>/.
    workaround_codes: []
    owned_by: looptools

  SD_DD_EXPANSION_INCOMPLETE:
    class: missing-tool-feature
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/sd_dd_expansion.wl ddAssertNoSurvivors + run_eval_sd.wls; DESIGN-ITEM4.md A1 step 4 + DESIGN-ITEM4-AMENDMENT.md stage-0c F5"
    description: >-
      The singlet-doublet box small-momentum (DD-limit) expansion left one or more
      tensor-reduction heads in the amplitude. Checked at TWO stages by
      ddAssertNoSurvivors (the same function the exit-3 test drives): (1) the
      SYMBOLIC pre-evaluation stage (term bodies + Subexpr table after the
      D0i -> ddBoxHead rewrite) — the load-bearing site, because a D0i tensor head
      whose arguments have gone numeric auto-evaluates through the MathLink to a
      Gram-poled NUMBER and is invisible to any head pattern (PR #35 review F5);
      (2) the evaluated amplitude, for inert symbolic ddBoxHead leftovers. A
      survivor at either stage means LoopTools would evaluate (or already
      evaluated) a box tensor AT the degenerate DD point, re-introducing the
      Gram-determinant spurious pole that inflates ||M|| to ~1e28 (the verified
      item-4 blocker). Emitted verbatim as "SD-DD-EXPANSION-INCOMPLETE stage=<..>
      <ids>", exit 3 — NOTHING ships. Fix: extend sd_dd_expansion.wl ddBoxHead to
      cover the named tensor id(s); the amp_reduced/v2 census is
      dd0,dd1..dd3,dd00,dd11..dd33 (no rank>=3).
    owned_by: looptools

  SD_DD_DOUBLED_OFFSET_UNSUPPORTED:
    class: missing-tool-feature
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/sd_dd_expansion.wl ddIntU pivot guard; DESIGN-ITEM4-AMENDMENT.md stage-0c F4"
    description: >-
      The collinear DD box telescoping found a propagator subset with NO pair of
      distinct collinear offsets (a doubled propagator in the DD limit), which
      requires a mass-derivative of a scalar loop function. That branch was
      EXCISED per DESIGN-ITEM4-AMENDMENT.md stage-0c F4: the previous
      finite-difference implementation differentiated an integral from which the
      perturbed propagator had already been removed, silently returning a ~0
      derivative that passed its own convergence check (PR #35 review F4). A loud
      unsupported case is strictly better than a latent silent-zero. Emitted as
      "SD-DD-DOUBLED-OFFSET-UNSUPPORTED props=.. offsets=..", exit 3. Unreachable
      for the SD box census (offset b_0=0 is always distinct from the
      massive-line offsets); reinstate a derivative branch only with its own
      LoopTools cross-check.
    workaround_codes: []
    owned_by: looptools

  SD_SI_EXTRACTION_UNSTABLE:
    class: regime-mismatch
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/run_eval_sd.wls; DESIGN-ITEM4-AMENDMENT2.md Ruling 3"
    description: >-
      The scalar SI coefficient C_scalar moves by >=1% between the production
      3-operator fit (UNROTATED amplitude) and the rotated-complete instrument
      fit. HISTORY: earlier catalog text quoted a 12.4 shift measured on the
      rank-12 pre-amendment2 basis — an instrument artifact, no physics meaning.
      MEASURED (round 3, canonical point): si_shift_rel = 1.0008 with all
      instrument guards green, and the crossing-symmetry probe pinned the cause
      as REAL 3-op pollution — the unrotated Majorana-crossed monomials project
      a spurious -2.099e-7 onto O_S (the round-2 "direct-sector C_scalar")
      while both Majorana crossings genuinely contribute ~0 scalar (1e-14).
      Emitted as "SD-SI-EXTRACTION-UNSTABLE si_shift_rel=..", exit 3 — nothing
      ships. Per AMENDMENT2 Ruling 3, a persistent shift > 10% RETIRES the 3-op
      fit in favour of the full-basis fit as production — an adjudication-level
      change (AMENDMENT3), not a driver-side toggle.
    workaround_codes: []
    owned_by: looptools

  SD_VELOCITY_UNSTABLE:
    class: regime-mismatch
    fix_locality: local_patch
    severity: recoverable
    emitted_by: [looptools]
    triggered_by_axes: []
    digest_reference: "looptools/scripts/run_eval_sd.wls; DESIGN-ITEM4-AMENDMENT2.md Ruling 2 trigger (b)"
    description: >-
      C_scalar_full from the rotated-complete instrument fit drifts by >=1%
      when the sample-config velocities are scaled v -> v/10, OR the v/10
      instrument refuses its own pre-fit guards so the drift is unmeasurable.
      HISTORY: the earlier 97.9 drift was measured on the rank-12
      pre-amendment2 basis — an instrument artifact. MEASURED (round 3): the
      transfer-sampled instrument's conditioning collapses ~1/v^2 (cond 6.1e3
      at v -> 4.8e6 at v/10; the direction-variation separations are O(v^2)),
      so the v/10 leg refuses ILLCONDITIONED; independently, the 3-op fit on
      the ROTATED amplitude shows a 10.4% C_scalar drift — pre-registered
      reopen trigger (b) for per-config kinematics as coefficient-value bias.
      Emitted as "SD-VELOCITY-UNSTABLE full_basis_drift=.." or
      "SD-VELOCITY-UNSTABLE v/10 instrument refused: ..", exit 3.
    workaround_codes: []
    owned_by: looptools

