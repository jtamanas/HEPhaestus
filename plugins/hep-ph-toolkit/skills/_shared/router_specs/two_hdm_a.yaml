# 2HDM+a — canonical v2-axis ModelSpec for /model-router and
# /analytic-exception-detector.  Companion to the SARAH-format spec at
# plugins/hep-ph-toolkit/skills/_shared/modelspec_v3/specs/2hdm_a.yaml.
_schema_version: 2
name: two-hdm-a
display: "Two-Higgs-doublet model + pseudoscalar mediator DM"
version: "1.0"
authoring_status: provisional

gauge_groups:
  - {symbol: B,  group: U1,  kind: hypercharge, coupling: g1, gauge_boson: B0, gaugino: null, symmetry_breaking: {pattern: SM-EWSB}}
  - {symbol: WB, group: SU2, kind: left,        coupling: g2, gauge_boson: W,  gaugino: null, symmetry_breaking: {pattern: SM-EWSB}}
  - {symbol: G,  group: SU3, kind: color,       coupling: g3, gauge_boson: g,  gaugino: null, symmetry_breaking: {pattern: unbroken}}

scalars:
  - name: H1
    reps: {WB: 2, G: 1}
    hypercharge: 0.5
    cp: even
  - name: H2
    reps: {WB: 2, G: 1}
    hypercharge: 0.5
    cp: even
  - name: a
    reps: {WB: 1, G: 1}
    hypercharge: 0
    cp: odd

fermions:
  - name: chi
    reps: {WB: 1, G: 1}
    hypercharge: 0
    spin: "1/2"
    majorana: true

dm_phenomenology:
  candidates:
    - name: chi
      field_type: "Majorana fermion"
      mediator_regime: "off-resonance"
      uv_provenance: "tree-level portal"
      mass_parameter: m_chi
      cp: null
      mediator_field: a
      stabilisation_mechanism: Z2
      blind_spot_reference: null
      multi_component_partner: null
      coupled: null
  stabilizing_symmetry: Z2
  coannihilation: false

lagrangian:
  spec_intent:
    requested_emissions: [ufo, spheno]
  interactions:
    - type: Yukawa
      fields: [a, chi, chi]
      coupling: y_chi

outputs:
  - ufo
  - spheno

backends:
  spectrum: analytic
  analytic_module: "analytic_models.stub_unimplemented"
