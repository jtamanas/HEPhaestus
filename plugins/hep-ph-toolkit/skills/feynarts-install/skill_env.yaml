# feynarts-install skill environment configuration
# Pin FeynArts version. Override at runtime with HEPPH_FEYNARTS_VERSION.
feynarts_version: "3.11"

# Tarball URL template.
# {version} is replaced by feynarts_version (or HEPPH_FEYNARTS_VERSION).
tarball_url_template: "https://www.feynarts.de/FeynArts-{version}.tar.gz"

# SHA256 of the FeynArts-3.11.tar.gz tarball.
# TODO: replace with actual checksum once tarball is mirrored.
sha256: "TODO"

# Install directory convention: $UserBaseDirectory/Applications/FeynArts-{version}/
# On macOS: ~/Library/Wolfram/Applications/FeynArts-3.11/
# On Linux (Wolfram Engine): ~/.WolframEngine/Applications/FeynArts-3.11/
install_dir_template: "$UserBaseDirectory/Applications/FeynArts-{version}/"

# Disk space requirement (GB)
min_disk_gb: 1
