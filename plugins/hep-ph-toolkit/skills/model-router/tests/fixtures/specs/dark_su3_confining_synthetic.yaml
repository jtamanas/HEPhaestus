      cp: null
      mediator_field: null
      stabilisation_mechanism: dark_baryon_number
      blind_spot_reference: null
      multi_component_partner: null
      coupled: null
  stabilizing_symmetry: dark_baryon_number
  coannihilation: false

lagrangian:
  spec_intent:
    requested_emissions: [analytic_only]
  interactions: []

outputs:
  - analytic_only
