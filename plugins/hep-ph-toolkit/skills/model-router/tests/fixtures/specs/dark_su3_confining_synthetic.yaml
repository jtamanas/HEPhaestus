  - {symbol: WB, group: SU2, kind: left,        coupling: g2, gauge_boson: W,   gaugino: null, symmetry_breaking: {pattern: SM-EWSB}}
  - {symbol: G,  group: SU3, kind: color,       coupling: g3, gauge_boson: g,   gaugino: null, symmetry_breaking: {pattern: unbroken}}
  - {symbol: GD, group: SU3, kind: dark,        coupling: g_D, gauge_boson: VD, gaugino: null, symmetry_breaking: {pattern: unbroken-confining}}

fermions:
  - name: q_D
    reps: {WB: 1, G: 1, GD: 3}
    hypercharge: 0
    spin: "1/2"

