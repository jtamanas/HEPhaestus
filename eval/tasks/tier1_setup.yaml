# ============================================================
# NMSSM bino/higgsino blind-spot benchmark — arXiv:2509.15121
# ============================================================

- id: t1_nmssm_proc_card
  task_type: mg_required
  tier: 1
  model: nmssm-bino-higgsino
  prompt: >
    Using MadGraph5, write and report a proc_card.dat for the process
    pp > chi1+ chi20 j (associated chargino-neutralino + jet production)
    in the NMSSM with the built-in MG5 nmssm UFO model
    (arXiv:2509.15121). The proc_card should import the nmssm model,
    generate p p > x1+ n2 j, and output to a directory named nmssm_x1pn2j.
    Report the proc_card content in your JSON output under the key "proc_card".
  reference_fn: nmssm_proc_card
  reference_args: {}
  graders:
    - type: file_contains
      key: proc_card
      pattern: "import model.*nmssm"
    - type: file_contains
      key: proc_card
      pattern: "generate.*x1\\+.*n2.*j"
  tags: [proc_card, nmssm, setup, mg5_batch]

- id: t1_nmssm_transcription_bp1_3
  task_type: na
  tier: 1
  model: nmssm-bino-higgsino
  prompt: >
    Transcription check only — do not recompute.
    Report the paper-quoted values of sigma_DD_SI (direct detection SI cross section
    in cm^2) and Omega_h2 (relic density) for benchmark point BP1-3 of
    arXiv:2509.15121 (Table 7). These are NMSSMTools/micrOMEGAs outputs from the paper.
    Report sigma_DD_SI as a float in cm^2 and omega_h2 as a float.
  reference_fn: nmssm_transcription_bp
  reference_args:
    bp_name: BP1_3
  graders:
    - type: numeric
      key: sigma_DD_SI
      tolerance: 0.05
    - type: numeric
      key: omega_h2
      tolerance: 0.10
  tags: [nmssm, BP1_3, transcription-check]

