    g_tilde: 1.0
    sin_theta: 0.1
    m_H2: 300.0
    m_V: 200.0
  graders:
    - type: numeric
      key: param_gtilde
      tolerance: 1.0e-10
    - type: numeric
      key: param_mV
      tolerance: 1.0e-10
  tags: [param_card, dark-su3, setup, card_io]

# --- MadGraph output parsing using lhe_parser.py ---

- id: t1_parse_banner
  task_type: na
  tier: 1
  model: generic
  prompt: >
    The MadGraph skill provides lhe_parser.py with functions parse_lhe() and
    extract_cross_section() for reading LHE output files.

    extract_cross_section(path) returns a tuple (xsec_pb, error_pb) by
    parsing the <init> block of an LHE XML file.

    If you had an LHE file where the <init> block second line reads:
      1.234e-03  5.678e-05  1.000  1

    What cross-section and unit would extract_cross_section return?
    Report xsec and xsec_unit.
  reference_fn: parse_mg5_xsec_banner
  reference_args: {}
  graders:
    - type: numeric
      key: xsec
      tolerance: 1.0e-10
    - type: unit
      key: xsec_unit
      expected: pb
  tags: [parsing, setup, lhe_parser]

- id: t1_parse_html
  task_type: na
  tier: 1
  model: generic
  prompt: >
    MadGraph writes cross-section results to stdout and banner files. The
    lhe_parser.py from the MadGraph skill extracts these values.

    If a MadGraph banner contains the line:
      #  Integrated weight (pb)  :  5.678e-02

    What value and unit would you report? Report xsec and xsec_unit.
  reference_fn: parse_mg5_xsec_html
  reference_args: {}
  graders:
    - type: numeric
      key: xsec
      tolerance: 1.0e-10
    - type: unit
      key: xsec_unit
      expected: pb
  tags: [parsing, setup, lhe_parser]

# ======================================================================
# Scalar Portal Singlet (arXiv:2601.13147) — Tier 1 setup tasks
# ======================================================================

- id: t1_sps_proc_card
  task_type: mg_required
  tier: 1
  model: scalar-portal-singlet
  prompt: >
    Write a Python script that generates the expected MadGraph proc_card.dat
    content for the scalar portal singlet fermion DM model (arXiv:2601.13147).

    The model name is "scalar_portal_singlet". The processes are:
      p p > h2  (h2 production via gg fusion)
      chi chi~ > p p  (DM annihilation)

    Report the proc_card content as a string under the key "proc_card".
  reference_fn: sps_proc_card
  reference_args: {}
  graders:
    - type: file_contains
      key: proc_card
      pattern: "import model scalar_portal_singlet"
    - type: file_contains
      key: proc_card
      pattern: "generate p p > h2"
  tags: [proc_card, scalar-portal-singlet, setup]

- id: t1_sps_param_card_bp1
  task_type: mg_required
  tier: 1
  model: scalar-portal-singlet
  prompt: >
    Prepare param_card values for the scalar portal singlet model at BP1:
    m_h1=125.25 GeV, m_h2=200.0 GeV, sin_theta=0.001, lambda_s=3.38,
    mu_3=-20.0 GeV, m_chi=222.0 GeV, g_chi=0.57.

    Do NOT include lambda_hs as an input -- derive it internally from the
    physical input parameters. Report the 5 values:
    param_m_h2, param_sin_theta, param_lambda_s, param_m_chi, param_g_chi.
  reference_fn: sps_param_card
  reference_args:
    m_h1: 125.25
    m_h2: 200.0
    sin_theta: 0.001
    lambda_s: 3.38
    mu_3: -20.0
    m_chi: 222.0
    g_chi: 0.57
  graders:
    - type: numeric
      key: param_m_h2
      tolerance: 1.0e-6
    - type: numeric
      key: param_sin_theta
      tolerance: 1.0e-6
    - type: numeric
      key: param_lambda_s
      tolerance: 1.0e-6
    - type: numeric
      key: param_m_chi
      tolerance: 1.0e-6
    - type: numeric
      key: param_g_chi
      tolerance: 1.0e-6
  tags: [param_card, scalar-portal-singlet, BP1, setup]

