# Tier 1 — Setup: Can the agent use MadGraph skill scripts correctly?
#
# These tasks test whether the agent can call the MadGraph/MadDM utility
# scripts with correct arguments and interpret the output.

# --- proc_card generation using mg5_batch.py ---

- id: t1_sd_proc_card
  task_type: mg_required
  tier: 1
  model: singlet-doublet
  prompt: >
    Using the mg5_batch.generate_proc_card() function from the MadGraph skill
    scripts, generate a proc_card.dat for DM-nucleon elastic scattering in
    the singlet-doublet fermion dark matter model.

    The function signature is:
      generate_proc_card(processes, model, output_name, multiparticle_defs)

    The UFO model name is "SingletDoublet_UFO". The DM candidate is chi1.
    Include both u and d quark scattering: chi1 u > chi1 u, chi1 d > chi1 d.

    Write and execute a Python script that calls this function and prints the
    result. Report the generated proc_card content in your JSON output under
    the key "proc_card".
  reference_fn: sd_proc_card
  reference_args: {}
  graders:
    - type: file_contains
      key: proc_card
      pattern: "import model"
    - type: file_contains
      key: proc_card
      pattern: "generate.*chi1.*>.*chi1"
  tags: [proc_card, singlet-doublet, setup, mg5_batch]

- id: t1_thdma_proc_card
  task_type: mg_required
  tier: 1
  model: 2HDM+a
  prompt: >
    Using mg5_batch.generate_proc_card(), generate a proc_card.dat for DM
    pair annihilation into quarks in the 2HDM+a model.

    The UFO model is "DMPseudo_2HDM". The DM is a Dirac fermion named "chi".
    Include b-bbar and t-tbar final states:
      chi chi~ > b b~
      chi chi~ > t t~

    Write and execute a Python script calling generate_proc_card() and report
    the proc_card content.
  reference_fn: thdma_proc_card
  reference_args: {}
  graders:
    - type: file_contains
      key: proc_card
      pattern: "import model"
    - type: file_contains
      key: proc_card
      pattern: "generate.*chi.*chi~.*>.*b"
  tags: [proc_card, 2HDM+a, setup, mg5_batch]

- id: t1_dsu3_proc_card
  task_type: mg_required
  tier: 1
  model: dark-su3
  prompt: >
    Using mg5_batch.generate_proc_card(), generate a proc_card.dat for
    vector DM-nucleon elastic scattering in the Dark SU(3) model.

    The UFO model is "DarkSU3_UFO". The DM is the dark vector boson V1.
    Include u and d quark channels: V1 u > V1 u, V1 d > V1 d.

    Write and execute a Python script and report the proc_card content.
  reference_fn: dsu3_proc_card
  reference_args: {}
  graders:
    - type: file_contains
      key: proc_card
      pattern: "import model"
    - type: file_contains
      key: proc_card
      pattern: "generate.*V1.*>.*V1"
  tags: [proc_card, dark-su3, setup, mg5_batch]

# --- param_card values using card_io.py conventions ---

- id: t1_sd_param_card
  task_type: mg_required
  tier: 1
  model: singlet-doublet
  prompt: >
    You need to prepare a param_card.dat for the singlet-doublet model using
    the card_io.py SLHA utilities from the MadGraph skill. The card_io module
    provides read_param_card(), write_param_card(), and update_param() functions.

    At the benchmark point m_S=150 GeV, m_D=500 GeV, y=1.0, theta=0, compute
    the Yukawa couplings y1 = y*cos(theta) and y2 = y*sin(theta).

    Write a Python script that computes these values and report them as:
    param_mS, param_mD, param_y1, param_y2.
  reference_fn: sd_param_card
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
    theta: 0.0
  graders:
    - type: numeric
      key: param_mS
      tolerance: 1.0e-10
    - type: numeric
      key: param_mD
      tolerance: 1.0e-10
    - type: numeric
      key: param_y1
      tolerance: 1.0e-10
    - type: numeric
      key: param_y2
      tolerance: 1.0e-10
  tags: [param_card, singlet-doublet, setup, card_io]

- id: t1_thdma_param_card
  task_type: mg_required
  tier: 1
  model: 2HDM+a
  prompt: >
    Prepare param_card values for the 2HDM+a model (DMPseudo_2HDM UFO) using
    the card_io.py conventions from the MadGraph skill.

    Benchmark: m_chi=200 GeV, m_a=200 GeV, m_H=m_A=m_Hpm=600 GeV,
    y_chi=1.0, sin_theta=0.35, tan_beta=1.0.

    Write a Python script and report: param_mchi, param_ychi, param_sintheta.
  reference_fn: thdma_param_card
  reference_args:
    m_chi: 200.0
    m_a: 200.0
    m_H: 600.0
    m_A: 600.0
    m_Hpm: 600.0
    y_chi: 1.0
    sin_theta: 0.35
    tan_beta: 1.0
  graders:
    - type: numeric
      key: param_mchi
      tolerance: 1.0e-10
    - type: numeric
      key: param_ychi
      tolerance: 1.0e-10
    - type: numeric
      key: param_sintheta
      tolerance: 1.0e-10
  tags: [param_card, 2HDM+a, setup, card_io]

- id: t1_dsu3_param_card
  task_type: mg_required
  tier: 1
  model: dark-su3
  prompt: >
    Prepare param_card values for the Dark SU(3) model using card_io.py
    conventions from the MadGraph skill.

    Benchmark: g_tilde=1.0, sin_theta=0.1, m_H2=300 GeV, m_V=200 GeV.

    Write a Python script and report: param_gtilde, param_sintheta,
