# ===========================================================================
# Paper 4 — arXiv:2511.21808 — GCE WIMP Comprehensive Study
# ===========================================================================

- id: t3_p4_Lmu_Le_table2_selfcheck_roundtrip
  task_type: algebra
  tier: 3
  model: zprime-Lmu-Le
  prompt: >
    Self-consistency check (NOT an external paper anchor). For the Lmu-Le portal
    with m_DM=44.1 GeV, m_Zp=120 GeV, g_chi=1.0, Dirac DM: evaluate sigma_v
    at g_Zp=0.5, then solve for g_Zp that reproduces the same sigma_v value.
    Re-evaluate sigma_v at the solved g_Zp. Report it under key "sigma_v_roundtrip".
  reference_fn: p4_table2_inversion_roundtrip
  reference_args:
