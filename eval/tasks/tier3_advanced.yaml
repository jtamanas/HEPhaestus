# Tier 3 — Advanced: derived quantities, cross-checks, and limits
#
# These tasks require the agent to write and execute code for composite
# calculations: finding blind spots, verifying algebraic identities,
# cross-checking two independent code paths to the same quantity.

# ======================================================================
# Singlet-Doublet: find blind spot and verify coupling vanishes
# ======================================================================

- id: t3_sd_blind_spot_mS150
  task_type: algebra
  tier: 3
  model: singlet-doublet
  prompt: >
    Using a Python script with scipy.optimize, find the blind spot in the
    singlet-doublet model (arXiv:2506.19062). For m_S=150 GeV, m_D=500 GeV,
    y=1: numerically solve for the mixing angle theta where the tree-level
    SI cross-section vanishes. The blind spot condition is
    m_chi1(theta) + m_D * sin(2*theta) = 0.

    Your script must: (1) build the mass matrix, (2) diagonalize it as a
    function of theta, (3) use brentq or similar to find theta_bs in [-pi/4, 0),
    (4) verify the Higgs coupling y_h vanishes at theta_bs.

    Write and execute the code. Report theta_bs, y_h_at_blind_spot,
    and blind_spot_param.
  reference_fn: sd_find_blind_spot
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
  graders:
    - type: numeric
      key: theta_bs
      tolerance: 0.01
    - type: exact_zero
      key: y_h_at_blind_spot
      tolerance: 1.0e-6
    - type: exact_zero
      key: blind_spot_param
      tolerance: 1.0e-8
  tags: [blind-spot, singlet-doublet, self-consistent]

- id: t3_sd_blind_spot_mS300
  task_type: algebra
  tier: 3
  model: singlet-doublet
  prompt: >
    Using a Python script with scipy.optimize, find the blind spot theta for
    the singlet-doublet model at m_S=300 GeV, m_D=700 GeV, y=0.8. Verify the
    Higgs coupling vanishes at that angle. Write and execute the code.
  reference_fn: sd_find_blind_spot
  reference_args:
    m_S: 300.0
    m_D: 700.0
    y: 0.8
  graders:
    - type: numeric
      key: theta_bs
      tolerance: 0.01
    - type: exact_zero
      key: y_h_at_blind_spot
      tolerance: 1.0e-6
  tags: [blind-spot, singlet-doublet, self-consistent]

# ======================================================================
# 2HDM+a: tree-level SI is zero by CP symmetry
# ======================================================================

- id: t3_thdma_tree_si_zero
  task_type: mg_required
  tier: 3
  model: 2HDM+a
  prompt: >
    In the 2HDM+a model, tree-level spin-independent scattering via
    pseudoscalar exchange is forbidden by CP symmetry — a pseudoscalar mediator
    cannot generate a scalar-type nucleon operator at tree level.

    Write a Python script that attempts to compute the tree-level SI
    cross-section for pseudoscalar exchange and confirms it is identically
    zero for any parameter choice. Use y_chi=1, sin_theta=0.35, m_a=200,
    m_chi=200 GeV. Execute the code and report sigma_SI_tree.
  reference_fn: thdma_tree_si_zero
  reference_args:
    y_chi: 1.0
    sin_theta: 0.35
    m_a: 200.0
    m_chi: 200.0
  graders:
    - type: exact_zero
      key: sigma_SI_tree
      tolerance: 1.0e-15
  tags: [CP-symmetry, 2HDM+a, tree-level]

# ======================================================================
# SD+2HDM: two-Higgs cancellation condition
# ======================================================================

- id: t3_sd2hdm_cancel_mH300
  task_type: algebra
  tier: 3
  model: singlet-doublet-2HDM
  prompt: >
    Using a Python script, find the two-Higgs blind spot in the SD+2HDM model.
    When both h (125 GeV) and H contribute to SI scattering, the amplitude is:
      A = y_h / m_h^2 + y_H / m_H^2
    Find the value y_H that makes A=0 for y_h=0.1, m_H=300 GeV,
    m_chi=200 GeV, then verify sigma_SI drops to zero. Execute the code.
  reference_fn: sd_two_higgs_cancellation
  reference_args:
    m_chi: 200.0
    y_h: 0.1
    m_H_heavy: 300.0
  graders:
    - type: numeric
      key: y_H_cancel
      tolerance: 0.01
    - type: exact_zero
      key: sigma_SI_at_cancel
      tolerance: 1.0e-60
  tags: [blind-spot, two-higgs, cancellation]

- id: t3_sd2hdm_cancel_mH600
