# ============================================================
# NMSSM bino/higgsino blind-spot benchmark — arXiv:2509.15121
# ============================================================

- id: t3_nmssm_blind_spot_eq7_on_bp1_3
  task_type: algebra
  tier: 3
  model: nmssm-bino-higgsino
  prompt: >
    Evaluate the LHS of the NMSSM bino/higgsino blind-spot identity, Eq. (7) of
    arXiv:2509.15121, at benchmark point BP1-3:
      LHS = [m_chi1 + g1^2 * v^2 / (M1 - m_chi1)] / (mu_eff * sin(2*beta))
    Parameters: M1=500 GeV, mu_eff=161.8 GeV, tan_beta=6.2.
    Use the SIGNED m_chi1 eigenvalue from the 5x5 diagonalization (SLHA-1 convention).
    g1 is SM-normalized (g1=0.3574, NOT GUT-normalized).
    Also report denom_margin_gev = |M1 - m_chi1_signed|.
    Write and execute Python code. Report lhs_eq7 and denom_margin_gev.
    NOTE: With M1=500 GeV (decoupled bino), LHS is NOT ~1 at these BPs;
    the expected value is determined by the reference implementation.
  reference_fn: nmssm_blind_spot_eq7_on_bp
  reference_args:
    bp_name: BP1_3
  graders:
    - type: numeric
      key: lhs_eq7
      tolerance: 0.02
  tags: [blind-spot, nmssm, identity, BP1_3, computed]

- id: t3_nmssm_blind_spot_eq7_off_bp1_3
  task_type: algebra
  tier: 3
  model: nmssm-bino-higgsino
  prompt: >
    Evaluate the LHS of Eq. (7) of arXiv:2509.15121 at the off-blind-spot cousin
    of BP1-3: take all parameters from BP1-3 but flip the sign of mu_eff
    (mu_eff -> -161.8 GeV, vS -> -5992.59 GeV, all others unchanged).
    Report lhs_off (the LHS value), abs_lhs_off_minus_1 = |LHS - 1|, and
    floor_excess = |LHS - 1| - 0.30 (should be positive if LHS is far from 1).
    Use SIGNED m_chi1 from 5x5 diagonalization. g1 SM-normalized.
  reference_fn: nmssm_blind_spot_eq7_off_bp
  reference_args:
    bp_name: BP1_3
  graders:
    - type: numeric
      key: floor_excess
      tolerance: 1.0
  tags: [blind-spot, nmssm, identity, negative-control, computed]

- id: t3_nmssm_blind_spot_eq7_synthetic
  task_type: algebra
  tier: 3
  model: nmssm-bino-higgsino
  prompt: >
    Construct a synthetic 4x4 decoupled-limit blind spot for arXiv:2509.15121, Eq. (7).
    Decouple the wino (M2=1e6) and singlino (kappa=1e-10, vS=0). Use mu_eff=400 GeV,
    tan_beta=10, lambda=0.027. Iteratively find M1 such that the condition
      m_chi1 + g1^2*v^2/(M1 - m_chi1) = mu_eff * sin(2*beta)
    is self-consistently satisfied (where m_chi1 depends on M1 via 5x5 diag).
    At the converged M1, compute LHS of Eq. (7). Report lhs_eq7.
    Expected: LHS = 1.0 to < 1e-6 (exact blind spot by construction).
    Use g1=0.3574 (SM-normalized), v=246.22 GeV. Write and execute Python code.
  reference_fn: nmssm_blind_spot_eq7_synthetic
  reference_args: {}
  graders:
    - type: numeric
      key: lhs_eq7
      tolerance: 1.0e-6
  tags: [blind-spot, nmssm, identity, synthetic, computed]

- id: t3_nmssm_spectrum_identities_bp1_3
  task_type: algebra
  tier: 3
  model: nmssm-bino-higgsino
  prompt: >
    Verify algebraic identities for the NMSSM neutralino diagonalization
    (arXiv:2509.15121, Eqs. 3-5) at BP1-3 (M1=500, M2=5000, mu_eff=161.8,
    tan_beta=6.2, lambda=0.027, kappa=0.01243, vS=5992.59).
    Using scipy.linalg.eigh:
    1. trace_diff = sum(signed_eigenvalues) - trace(M) [should be ~0]
    2. det_diff_rel = |prod(signed_eigenvalues) - det(M)| / |det(M)| [~0]
    3. orthogonality_fnorm = ||N N^T - I_5||_F [should be < 1e-12]
    4. fraction_sum_err = |Z_B + Z_W + Z_H + Z_S - 1| [should be < 1e-12]
    Write and execute Python code. Report all four quantities.
  reference_fn: nmssm_spectrum_identities
  reference_args:
    bp_name: BP1_3
  graders:
    - type: exact_zero
      key: trace_diff
      tolerance: 1.0e-9
    - type: exact_zero
      key: orthogonality_fnorm
      tolerance: 1.0e-12
    - type: exact_zero
      key: fraction_sum_err
      tolerance: 1.0e-12
    - type: numeric
      key: det_diff_rel
      tolerance: 1.0e-8
  tags: [identities, nmssm, BP1_3, computed]
