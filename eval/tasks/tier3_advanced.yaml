# ======================================================================
# Scalar Portal Singlet (arXiv:2601.13147) — Tier 3 advanced tasks
# ======================================================================

- id: t3_sps_mass_two_route_bp1
  task_type: algebra
  tier: 3
  model: scalar-portal-singlet
  prompt: >
    For the scalar portal singlet model (arXiv:2601.13147) at BP1
    (m_h1=125.25, m_h2=200, sin_theta=0.001, lambda_s=3.38, mu_3=-20):
    compute the CP-even Higgs mass spectrum via TWO independent routes.

    Route A: analytical closed-form formulas (Eqs. 11-12) using
    m_h1_h2_analytical(M_hh, M_ss, M_hs).
    Route B: numerical diagonalization using diagonalize_numerical(M_sq).

    Both routes use the same mass matrix. Report the differences:
    diff_m_h1 = route_A_m_h1 - route_B_m_h1
    diff_m_h2 = route_A_m_h2 - route_B_m_h2
    diff_sin_theta = route_A_sin_theta - route_B_sin_theta

    These differences must be exactly zero (within floating-point tolerance).
  reference_fn: sps_mass_two_route
  reference_args:
    m_h1: 125.25
    m_h2: 200.0
    sin_theta: 0.001
    lambda_s: 3.38
    mu_3: -20.0
  graders:
    - type: exact_zero
      key: diff_m_h1
      tolerance: 1.0e-10
    - type: exact_zero
      key: diff_m_h2
      tolerance: 1.0e-10
    - type: exact_zero
      key: diff_sin_theta
      tolerance: 1.0e-10
  tags: [mass-spectrum, scalar-portal-singlet, two-route, BP1]

- id: t3_sps_blind_spot_identity
  task_type: algebra
  tier: 3
  model: scalar-portal-singlet
  prompt: >
    Verify the blind-spot identity for the scalar portal singlet model
    (arXiv:2601.13147): when m_h2 = m_h1 (mass degeneracy), the
    spin-independent cross-section must be EXACTLY zero.

    This is a fundamental property: the blind-spot factor
    (m_h2^2 - m_h1^2)/(m_h1^2 * m_h2^2) vanishes at degeneracy,
    cancelling the amplitude exactly regardless of other parameters.

    Use m_chi=222, g_chi=0.57, sin_theta=0.001, m_h1=m_h2=125.25.
    Report sigma_SI_at_degeneracy in cm^2 — it must be identically zero.
  reference_fn: sps_blind_spot
  reference_args:
    m_chi: 222.0
    g_chi: 0.57
    sin_theta: 0.001
    m_h1: 125.25
  graders:
    - type: exact_zero
      key: sigma_SI_at_degeneracy
      tolerance: 0.0
  tags: [blind-spot, scalar-portal-singlet, identity]

- id: t3_sps_pn_ratio_bp1
  task_type: algebra
  tier: 3
  model: scalar-portal-singlet
  prompt: >
    Verify the proton-to-neutron sigma_SI ratio for the scalar portal
    singlet model (arXiv:2601.13147) at BP1:
    m_chi=222, g_chi=0.57, sin_theta=0.001, m_h1=125.25, m_h2=200.

    This ratio is a STRUCTURAL IDENTITY: sigma_SI_p / sigma_SI_n =
    (f_N_proton / f_N_neutron)^2, where f_N are the nucleon form factors.
    The ratio is independent of m_chi, g_chi, sin_theta, and the Higgs masses.

    Compute sigma_SI for proton (using F_U_P, F_D_P, F_S_P) and for neutron
    (using F_U_N, F_D_N, F_S_N). Report sigma_p_over_n = sigma_SI_p / sigma_SI_n.
  reference_fn: sps_pn_ratio
  reference_args:
    m_chi: 222.0
    g_chi: 0.57
    sin_theta: 0.001
    m_h1: 125.25
    m_h2: 200.0
  graders:
    - type: numeric
      key: sigma_p_over_n
      tolerance: 1.0e-10
  tags: [SI, scalar-portal-singlet, proton-neutron-ratio, BP1]

- id: t3_sps_lagrangian_roundtrip_bp1
  task_type: algebra
  tier: 3
  model: scalar-portal-singlet
  prompt: >
    Verify the Lagrangian round-trip for the scalar portal singlet model
    (arXiv:2601.13147) at BP1:
    m_h1=125.25, m_h2=200, sin_theta=0.001, lambda_s=3.38, mu_3=-20.

    The round-trip test:
    1. Convert physical params (m_h1, m_h2, sin_theta, lambda_s, mu_3) to
       Lagrangian params (lambda_h, lambda_hs, mu_hs, mu_s_sq) via
       lagrangian_params_from_physical.
    2. Build the mass matrix from Lagrangian params.
    3. Diagonalize numerically to recover (m_h1, m_h2, sin_theta).
    4. Compare recovered values to inputs.

    Report m_h1_recovered, m_h2_recovered, sin_theta_recovered.
    They must match the input values to 1e-10 relative precision.
  reference_fn: sps_lagrangian_roundtrip
  reference_args:
    m_h1: 125.25
    m_h2: 200.0
    sin_theta: 0.001
    lambda_s: 3.38
    mu_3: -20.0
  graders:
    - type: numeric
      key: m_h1_recovered
      tolerance: 1.0e-10
    - type: numeric
      key: m_h2_recovered
      tolerance: 1.0e-10
    - type: numeric
      key: sin_theta_recovered
      tolerance: 1.0e-10
  tags: [round-trip, scalar-portal-singlet, lagrangian, BP1]

- id: t3_sps_cross_paper_regression
  task_type: algebra
  tier: 3
  model: scalar-portal-singlet
  prompt: >
    Verify the heavy-m_h2 limit of the scalar portal singlet sigma_SI formula
    (Eq. 31, arXiv:2601.13147) against the single-Higgs result from
    arXiv:2506.19062.

    In the limit m_h2 >> m_h1, the blind-spot factor reduces to 1/m_h1^2,
    and Eq. 31 becomes equivalent to the single-Higgs portal formula with
    effective coupling y_h_eff = g_chi * sin_theta * sqrt(1 - sin_theta^2).

    At m_chi=222, g_chi=0.57, sin_theta=0.001, m_h1=125.25, m_h2=1e7:
    - Compute sigma_31 using the scalar portal singlet formula (Eq. 31)
    - Compute sigma_ref using sigma_SI_higgs_portal from 2506.19062 with
      y_h_eff = g_chi * sin_theta * sqrt(1 - sin_theta^2) and m_h=m_h1
    - Report ratio_minus_one = sigma_31 / sigma_ref - 1.0

    This must be within 1e-8 of zero.
    (Note: m_h2=1e6 gives finite-correction 3.14e-8 > 1e-8 tolerance; 1e7
    gives 3.14e-10 well within tolerance. See RECONCILIATION.md S6.)
  reference_fn: sps_cross_paper_regression
  reference_args:
    m_chi: 222.0
    g_chi: 0.57
    sin_theta: 0.001
    m_h1: 125.25
    m_h2: 1.0e7
  graders:
    - type: exact_zero
      key: ratio_minus_one
      tolerance: 1.0e-8
  tags: [scalar-portal-singlet, cross-paper-regression, heavy-limit]

