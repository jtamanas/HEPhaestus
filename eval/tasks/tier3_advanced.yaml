# ======================================================================
# Coupling cross-check: Eq.7 vs Eq.33 with Majorana factor
# ======================================================================

- id: t3_sd_coupling_xcheck_theta0
  task_type: algebra
  tier: 3
  model: singlet-doublet
  prompt: >
    Using a Python script, cross-check two independent calculations of the
    DM-Higgs coupling in the singlet-doublet model at m_S=150, m_D=500,
    y=1, theta=0.

    Implement BOTH routes in your code:
    (1) Eq. 7: analytical formula for y_{h chi1 chi1}
    (2) Eq. 33: compute from the mixing matrix U as
        y_h = 2 * (1/sqrt(2)) * (y1 * U[1,0] * U[0,0] + y2 * U[2,0] * U[0,0])
        (factor of 2 for Majorana diagonal coupling)

    They must agree. Execute the code and report y_h_eq7, y_h_eq33, and
    their absolute difference.
  reference_fn: sd_coupling_cross_check
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
    theta: 0.0
  graders:
    - type: numeric
      key: y_h_eq7
      tolerance: 0.001
    - type: numeric
      key: y_h_eq33
      tolerance: 0.001
    - type: exact_zero
      key: difference
      tolerance: 1.0e-4
  tags: [cross-check, coupling, singlet-doublet, majorana]

- id: t3_sd_coupling_xcheck_neg_theta
  task_type: algebra
  tier: 3
  model: singlet-doublet
  prompt: >
    Using a Python script, perform the same Eq.7 vs Eq.33 coupling cross-check
    at theta=-0.1 (near the blind spot region): m_S=150, m_D=500, y=1.
    Include the Majorana factor of 2 for the diagonal coupling. Execute code.
  reference_fn: sd_coupling_cross_check
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
    theta: -0.1
  graders:
    - type: numeric
      key: y_h_eq7
      tolerance: 0.001
    - type: numeric
      key: y_h_eq33
      tolerance: 0.001
    - type: exact_zero
      key: difference
      tolerance: 1.0e-4
  tags: [cross-check, coupling, singlet-doublet, majorana, blind-spot]

# ======================================================================
# sigma_SI quadratic scaling with y_h
# ======================================================================

- id: t3_si_yh_scaling
  task_type: algebra
  tier: 3
  model: generic
  prompt: >
    Using a Python script, verify that sigma_SI scales as y_h^2.
    Implement the Higgs-portal SI cross-section formula (Eq. 5 of
    arXiv:2506.19062) and compute it at y_h=0.1 and y_h=0.2 for
    m_chi=200 GeV. Report the ratio sigma(0.2)/sigma(0.1) — it
    should be exactly 4. Execute the code.
  reference_fn: sigma_si_yh_scaling
  reference_args:
    m_chi: 200.0
    y_h_base: 0.1
  graders:
    - type: numeric
      key: ratio
      tolerance: 1.0e-10
    - type: numeric
      key: expected_ratio
      tolerance: 1.0e-10
  tags: [scaling, SI, generic]

# ======================================================================
