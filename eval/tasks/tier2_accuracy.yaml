# Tier 2 — Accuracy: Does it get the physics right at known benchmarks?
#
# Each task requires the agent to write and execute code (using MadGraph scripts
# or numpy/scipy implementations of the model equations) to compute an observable.
# The agent must NOT compute from memory — it must run actual code.

# ======================================================================
# Singlet-Doublet: tree-level sigma_SI at 4 benchmark points
# ======================================================================

- id: t2_sd_si_fig2_ref
  task_type: mg_required
  tier: 2
  model: singlet-doublet
  prompt: >
    Using MadGraph or by writing and executing a Python script that implements
    the singlet-doublet fermion DM model (arXiv:2506.19062 Eq. 1-7), compute
    the tree-level spin-independent DM-nucleon cross-section at the Figure 2
    reference point: m_S=150 GeV, m_D=500 GeV, y=1, theta=0.

    You must write and run code to do this — do not compute analytically in
    your head. The calculation chain is: build 3x3 mass matrix (Eq. 3) →
    diagonalize to get m_chi1 → compute Higgs coupling y_h (Eq. 7) →
    evaluate sigma_SI (Eq. 5) using standard nucleon form factors.

    Report sigma_SI in cm^2 and the DM mass m_chi1 in GeV.
  reference_fn: sd_sigma_si_tree
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
    theta: 0.0
  graders:
    - type: numeric
      key: sigma_SI
      tolerance: 0.05
    - type: numeric
      key: m_chi1
      tolerance: 0.01
    - type: unit
      key: sigma_SI_unit
      expected: "cm^2"
  tags: [SI, tree-level, singlet-doublet, figure-2]

- id: t2_sd_si_near_bs
  task_type: mg_required
  tier: 2
  model: singlet-doublet
  prompt: >
    Using MadGraph or a Python script implementing the singlet-doublet model,
    compute sigma_SI near a blind spot: m_S=150 GeV, m_D=500 GeV, y=1,
    theta=-0.148 rad. Write and run the code — do not compute from memory.
    The cross-section should be suppressed relative to theta=0.
  reference_fn: sd_sigma_si_tree
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
    theta: -0.148
  graders:
    - type: numeric
      key: sigma_SI
      tolerance: 0.05
    - type: numeric
      key: m_chi1
      tolerance: 0.01
  tags: [SI, tree-level, singlet-doublet, blind-spot]

- id: t2_sd_si_heavy
  task_type: mg_required
  tier: 2
  model: singlet-doublet
  prompt: >
    Using MadGraph or a Python script, compute sigma_SI for a heavy DM
    benchmark in the singlet-doublet model: m_S=1000 GeV, m_D=1200 GeV,
    y=0.5, theta=0.3 rad. You must write and execute code.
  reference_fn: sd_sigma_si_tree
  reference_args:
    m_S: 1000.0
    m_D: 1200.0
    y: 0.5
    theta: 0.3
  graders:
    - type: numeric
      key: sigma_SI
      tolerance: 0.05
    - type: numeric
      key: m_chi1
      tolerance: 0.01
  tags: [SI, tree-level, singlet-doublet, heavy]

- id: t2_sd_si_symmetric
  task_type: mg_required
  tier: 2
  model: singlet-doublet
  prompt: >
    Using MadGraph or a Python script, compute sigma_SI with symmetric
    Yukawas in the singlet-doublet model: m_S=300 GeV, m_D=400 GeV,
    y=0.5, theta=pi/4 (so y1=y2). Write and execute code.
  reference_fn: sd_sigma_si_tree
  reference_args:
    m_S: 300.0
    m_D: 400.0
    y: 0.5
    theta: 0.7853981633974483
  graders:
    - type: numeric
      key: sigma_SI
      tolerance: 0.05
    - type: numeric
      key: m_chi1
      tolerance: 0.01
  tags: [SI, tree-level, singlet-doublet]

