- id: t2_sd_masses_fig2
  task_type: algebra
  tier: 2
  model: singlet-doublet
  prompt: >
    Using a Python script, build the 3x3 neutral fermion mass matrix for
    the singlet-doublet model (arXiv:2506.19062 Eq. 3) at m_S=150, m_D=500,
    y1=1.0, y2=0, and diagonalize it numerically with numpy. Report the
    physical masses m_chi1, m_chi2, m_chi3 in GeV, and the charged fermion
    mass m_psi (which equals m_D at tree level). You must run actual code.
  reference_fn: sd_mass_spectrum
  reference_args:
    m_S: 150.0
    m_D: 500.0
    y: 1.0
    theta: 0.0
  graders:
    - type: numeric
      key: m_chi1
      tolerance: 0.001
    - type: numeric
      key: m_chi2
      tolerance: 0.001
    - type: numeric
      key: m_chi3
      tolerance: 0.001
    - type: numeric
      key: m_psi_charged
      tolerance: 1.0e-10
  tags: [mass-spectrum, singlet-doublet, figure-2]

