# ======================================================================
# 2HDM+a: trilinear couplings at 3 points (Eq. 25)
# ======================================================================

- id: t2_thdma_trilinear_zero
  task_type: algebra
  tier: 2
  model: 2HDM+a
  prompt: >
    Using a Python script implementing Eq. 25 of arXiv:2506.19062, compute
    the trilinear couplings lambda_haa and lambda_Haa for the 2HDM+a model
    with lambda_1P=0, lambda_2P=0, tan_beta=10. Both should vanish.
    Write and execute the code.
  reference_fn: thdma_trilinear
  reference_args:
    lambda_1P: 0.0
    lambda_2P: 0.0
    tan_beta: 10.0
  graders:
