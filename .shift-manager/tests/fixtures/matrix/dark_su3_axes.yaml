# Axis-bundle fixture for dark-su3 model
# Derived from plugins/hep-ph-demo/skills/_shared/assets/dark_su3.yaml
# via ws1_axis_reader.py alias logic (outputs: -> spec_intent.requested_emissions:)
#
# WS1 taxonomy axes (WS1 synthesis §5):
#   A1 = SM + extra SU(N)   — gauge_groups has kind:dark, group:SU3
#   A2 = [{factor: GD, pattern: Higgsed-partial}]  — PhiD in SU3 fundamental acquires VEV
#   A3 = {has_dark_charged_fermion: false, has_majorana_fermion: false, has_chiral_bsm_fermion: false}  — fermions: []
#   A4 = {n_higgs_doublets: 1, n_pure_sm_singlets: 0, n_dark_charged_scalars: 1, cp_odd_scalar_present: true, replaces_sm_higgs: false, pseudo_goldstone_higgs: false}
#   A5 = []   — no explicit global_symmetries in spec
#   A6 = [higgs-portal]   — scalar_potential contains conj[H], H, conj[PhiD], PhiD term
#   A7 = false   — no extra colored matter under SM color SU3
#   A8 = complete   — authoring_status not set; not archived; analytic_module is real module (not stub)

axes:
  A1: "SM + extra SU(N)"
  A2:
    - factor: GD
      pattern: Higgsed-partial
  A3:
    has_dark_charged_fermion: false
    has_majorana_fermion: false
    has_chiral_bsm_fermion: false
  A4:
    n_higgs_doublets: 1
    n_pure_sm_singlets: 0
    n_dark_charged_scalars: 1
    cp_odd_scalar_present: true
    replaces_sm_higgs: false
    pseudo_goldstone_higgs: false
  A5: []
  A6:
    - higgs-portal
  A7: false
  A8: complete

candidates:
  - name: V
    field_type: vector
    mediator_regime: tree-level-open
    uv_provenance: broken-generator-boson
    stabilisation_mechanism: gauge-residual
    cp: even
  - name: Psi
    field_type: pseudoscalar
    mediator_regime: tree-level-open
    uv_provenance: mass-eigenstate-of-UV-fields
    stabilisation_mechanism: gauge-residual
    cp: odd

lagrangian:
  spec_intent:
    requested_emissions:
      - ufo
  kinetic_mixing_terms: []

model_runtime:
  # WS4 registry absent at WS2 implementation time; set to missing.
  # When WS4 ships with analytic_exceptions.yaml registering dsu3-002,
  # this becomes registered_active.
  analytic_module_status: missing
