# Axis-bundle fixture for singlet-doublet model
# Derived from plugins/model-building/skills/lagrangian-builder/assets/modelspec-templates/singlet_doublet.yaml
# via ws1_axis_reader.py alias logic.
#
# The singlet_doublet template already carries spec_intent.requested_emissions (WS1 migrated).
# WS1 taxonomy axes (per spec comments §5.1):
#   A1 = SM   — no extra gauge groups beyond SM
#   A2 = []   — no non-SM gauge factors
#   A3 = {has_dark_charged_fermion: false, has_majorana_fermion: true, has_chiral_bsm_fermion: true}
#   A4 = {n_higgs_doublets: 1, n_pure_sm_singlets: 0, n_dark_charged_scalars: 0, cp_odd_scalar_present: false, replaces_sm_higgs: false, pseudo_goldstone_higgs: false}
#   A5 = [{kind: discrete, name: Z2, stabilises: chi1}]
#   A6 = [higgs-portal]
#   A7 = false
#   A8 = complete

axes:
  A1: SM
  A2: []
  A3:
    has_dark_charged_fermion: false
    has_majorana_fermion: true
    has_chiral_bsm_fermion: true
  A4:
    n_higgs_doublets: 1
    n_pure_sm_singlets: 0
    n_dark_charged_scalars: 0
    cp_odd_scalar_present: false
    replaces_sm_higgs: false
    pseudo_goldstone_higgs: false
  A5:
    - kind: discrete
      name: Z2
      stabilises: chi1
  A6:
    - higgs-portal
  A7: false
  A8: complete

candidates:
  - name: chi1
    field_type: majorana-fermion
    mediator_regime: tree-level-open
    uv_provenance: UV-field
    stabilisation_mechanism: discrete-global
    cp: even

lagrangian:
  spec_intent:
    requested_emissions:
      - ufo
      - spheno
  kinetic_mixing_terms: []

model_runtime:
  analytic_module_status: missing
