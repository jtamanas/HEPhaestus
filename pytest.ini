[pytest]
# importlib import-mode lets a single repo-root `pytest plugins/ eval/` collect
# every skill's tests despite duplicate module basenames (test_smoke.py,
# test_schema.py, test_benchmarks.py, ...) across skills that lack a unique
# package path. Per-directory runs are unaffected.
addopts = --import-mode=importlib
markers =
    smoke: Tier-3 real-tool smoke tests (run with: pytest -m smoke)
    integration: Tier-2 hybrid tests with real helpers (run with: pytest -m integration)
    disclosure_contract: tests that enforce the disclosure-banner contract per analytic_exceptions.yaml (run with: pytest -m disclosure_contract)
